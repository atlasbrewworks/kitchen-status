<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Status</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #2ECC71; --amber: #F39C12; --red: #E74C3C;
    --bg: #0D0D0D; --surface: #161616; --border: #2a2a2a;
    --text: #F0EDE8; --muted: #666;
    --mono: 'DM Mono', monospace; --display: 'Syne', sans-serif;
  }
  body {
    background: var(--bg); color: var(--text); font-family: var(--mono);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px;
    opacity: 0; transition: opacity 0.2s ease;
  }
  body.ready { opacity: 1; }
  #widget { width: 100%; max-width: 480px; text-align: center; }
  .status-ring {
    width: 140px; height: 140px; border-radius: 50%; margin: 0 auto 28px;
    display: flex; align-items: center; justify-content: center; font-size: 48px;
    transition: box-shadow 0.6s ease, border-color 0.6s ease;
    border: 2px solid var(--border); position: relative;
  }
  .status-ring::after {
    content: ''; position: absolute; inset: -8px; border-radius: 50%;
    border: 1px solid transparent; transition: border-color 0.6s ease, box-shadow 0.6s ease;
  }
  .status-ring.green { border-color: var(--green); box-shadow: 0 0 40px rgba(46,204,113,0.15); }
  .status-ring.green::after { border-color: rgba(46,204,113,0.25); }
  .status-ring.amber { border-color: var(--amber); box-shadow: 0 0 40px rgba(243,156,18,0.15); }
  .status-ring.amber::after { border-color: rgba(243,156,18,0.25); }
  .status-ring.red { border-color: var(--red); box-shadow: 0 0 40px rgba(231,76,60,0.15); }
  .status-ring.red::after { border-color: rgba(231,76,60,0.25); }
  .label {
    font-family: var(--display); font-size: 13px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
  }
  .wait-time {
    font-family: var(--display); font-size: 64px; font-weight: 800;
    line-height: 1; transition: color 0.6s ease; margin-bottom: 4px;
  }
  .wait-time.green { color: var(--green); }
  .wait-time.amber { color: var(--amber); }
  .wait-time.red   { color: var(--red); }
  .wait-unit { font-size: 14px; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 24px; }
  .status-message {
    font-size: 14px; color: rgba(240,237,232,0.6); line-height: 1.6;
    max-width: 300px; margin: 0 auto 16px; min-height: 44px;
  }
  .last-updated { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 16px; }
  .countdown {
    font-size: 12px; color: var(--muted); letter-spacing: 0.06em;
    margin-bottom: 24px; min-height: 18px;
  }
  .countdown span { color: var(--text); font-weight: 500; }
  .order-btn {
    display: block; width: 100%; max-width: 320px; margin: 0 auto 12px;
    padding: 18px 24px; background: var(--text); color: var(--bg);
    font-family: var(--display); font-weight: 800; font-size: 16px;
    letter-spacing: 0.08em; text-transform: uppercase; border: none;
    border-radius: 12px; cursor: pointer; text-decoration: none;
    text-align: center; transition: opacity 0.2s;
  }
  .order-btn:hover { opacity: 0.85; }
  .order-btn.green { background: var(--green); color: #0D0D0D; }
  .order-btn.amber { background: var(--amber); color: #0D0D0D; }
  .order-btn.red   { background: var(--text);  color: var(--bg); }
  .table-label { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-align: center; margin-bottom: 40px; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 40px 0; }
  #admin { width: 100%; max-width: 480px; }
  .admin-toggle { text-align: center; margin-bottom: 32px; }
  .admin-toggle button {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em;
    padding: 6px 14px; border-radius: 4px; cursor: pointer;
    transition: border-color 0.2s, color 0.2s; text-transform: uppercase;
  }
  .admin-toggle button:hover { border-color: var(--text); color: var(--text); }
  #admin-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px; display: none;
  }
  #admin-panel.visible { display: block; }
  .admin-heading {
    font-family: var(--display); font-size: 11px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 20px;
  }
  .quick-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
  .quick-btn {
    padding: 14px 8px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-family: var(--mono);
    font-size: 12px; cursor: pointer; transition: border-color 0.2s, background 0.2s; text-align: center;
  }
  .quick-btn:hover { background: #1e1e1e; border-color: #444; }
  .quick-btn.active-green { border-color: var(--green); background: rgba(46,204,113,0.08); }
  .quick-btn.active-amber { border-color: var(--amber); background: rgba(243,156,18,0.08); }
  .quick-btn.active-red   { border-color: var(--red);   background: rgba(231,76,60,0.08); }
  .quick-btn .btn-dot { width: 8px; height: 8px; border-radius: 50%; margin: 0 auto 6px; }
  .quick-btn .btn-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .custom-row { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
  .custom-row input[type="number"] {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    font-family: var(--mono); font-size: 16px; padding: 10px 14px;
    border-radius: 8px; width: 80px; text-align: center; outline: none;
  }
  .custom-row input[type="number"]:focus { border-color: #555; }
  .custom-row span { color: var(--muted); font-size: 13px; }
  .message-input {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    font-family: var(--mono); font-size: 13px; padding: 10px 14px;
    border-radius: 8px; width: 100%; outline: none; margin-bottom: 16px;
    resize: none; height: 60px; line-height: 1.5;
  }
  .message-input:focus { border-color: #555; }
  .message-input::placeholder { color: #3a3a3a; }
  .set-btn {
    width: 100%; background: var(--text); color: var(--bg);
    font-family: var(--display); font-weight: 700; font-size: 13px;
    letter-spacing: 0.1em; text-transform: uppercase; padding: 14px;
    border-radius: 8px; border: none; cursor: pointer; transition: opacity 0.2s;
  }
  .set-btn:hover { opacity: 0.85; }
  .set-btn:active { opacity: 0.7; }
  .confirm-flash {
    text-align: center; font-size: 12px; color: var(--green);
    letter-spacing: 0.05em; height: 20px; margin-top: 10px;
    opacity: 0; transition: opacity 0.3s;
  }
  .confirm-flash.show { opacity: 1; }
</style>
</head>
<body>

<div id="widget">
  <p class="label">Current kitchen wait</p>
  <div class="status-ring amber" id="ring">🍽️</div>
  <div class="wait-time amber" id="timeDisplay">20–25</div>
  <div class="wait-unit">minutes</div>
  <p class="status-message" id="msgDisplay">We're a bit busy right now. Your order is worth the wait!</p>
  <p class="last-updated" id="updatedDisplay">Updated just now</p>
  <p class="countdown" id="countdown"></p>
  <a id="orderBtn" class="order-btn amber" href="#">Place My Order →</a>
  <p class="table-label" id="tableLabel"></p>
</div>

<hr class="divider">

<div id="admin">
  <div class="admin-toggle">
    <button onclick="toggleAdmin()">⚙ Staff update</button>
  </div>
  <div id="admin-panel">
    <p class="admin-heading">Set kitchen status</p>
    <div class="quick-btns">
      <button class="quick-btn" id="btn-green" onclick="setPreset('green')">
        <div class="btn-dot" style="background:var(--green)"></div>
        <div style="font-size:15px;margin-bottom:2px">10–15</div>
        <div class="btn-label">Smooth</div>
      </button>
      <button class="quick-btn" id="btn-amber" onclick="setPreset('amber')">
        <div class="btn-dot" style="background:var(--amber)"></div>
        <div style="font-size:15px;margin-bottom:2px">20–25</div>
        <div class="btn-label">Moderate</div>
      </button>
      <button class="quick-btn" id="btn-red" onclick="setPreset('red')">
        <div class="btn-dot" style="background:var(--red)"></div>
        <div style="font-size:15px;margin-bottom:2px">30–40</div>
        <div class="btn-label">Backed up</div>
      </button>
    </div>
    <p class="admin-heading" style="margin-top:16px">Custom time</p>
    <div class="custom-row">
      <input type="number" id="customMin" min="1" max="120" placeholder="15">
      <span>–</span>
      <input type="number" id="customMax" min="1" max="120" placeholder="20">
      <span>min</span>
    </div>
    <textarea class="message-input" id="customMsg" placeholder="Optional note to guests (e.g. 'Happy Hour orders may take longer')"></textarea>
    <button class="set-btn" onclick="applyCustom()">Update wait time</button>
    <div class="confirm-flash" id="confirmFlash">✓ Status updated</div>
  </div>
</div>

<script>
  var params = new URLSearchParams(window.location.search);
  var tableNum = params.get('table');
  var isGuest = !!tableNum;
  var countdownTimer = null;

  // ── Edit your splash screen messages here ──
  var presets = {
    green: { range: '10–15', msg: "Kitchen is running smoothly. Place your order and we'll get started!", color: 'green' },
    amber: { range: '20–25', msg: "We're a bit busy right now. Your order is worth the wait! Drinks arrive first!", color: 'amber' },
    red:   { range: '30–40', msg: "Kitchen is backed up — we appreciate your patience. Drinks arrive first!", color: 'red' }
  };

  // Set up order button
  var btn = document.getElementById('orderBtn');
  var tableLabel = document.getElementById('tableLabel');
  if (tableNum) {
    btn.href = 'https://bridgedistrict.atlasanddabo.menu/' + tableNum;
    tableLabel.textContent = 'Table ' + tableNum;
  } else {
    btn.style.display = 'none';
    tableLabel.style.display = 'none';
    document.getElementById('countdown').style.display = 'none';
  }

  function startCountdown(bbotUrl) {
    var secs = 20;
    var countdownEl = document.getElementById('countdown');
    countdownEl.innerHTML = 'Redirecting to order in <span>' + secs + '</span>s — or tap below';

    countdownTimer = setInterval(function() {
      secs--;
      if (secs <= 0) {
        clearInterval(countdownTimer);
        window.location.href = bbotUrl;
      } else {
        countdownEl.innerHTML = 'Redirecting to order in <span>' + secs + '</span>s — or tap below';
      }
    }, 1000);
  }

  function applyState(range, color, msg, ts) {
    document.getElementById('timeDisplay').textContent = range;
    document.getElementById('timeDisplay').className = 'wait-time ' + color;
    document.getElementById('ring').className = 'status-ring ' + color;
    document.getElementById('msgDisplay').textContent = msg;
    document.getElementById('orderBtn').className = 'order-btn ' + color;
    if (ts) {
      var d = new Date(ts);
      document.getElementById('updatedDisplay').textContent = 'Updated ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    }
    ['green','amber','red'].forEach(function(k) {
      document.getElementById('btn-' + k).className = 'quick-btn' + (k === color ? ' active-' + k : '');
    });
  }

  function pushStatus(range, color, msg) {
    fetch('/status', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ range: range, color: color, msg: msg })
    })
    .then(function(r) { return r.json(); })
    .then(function(s) { applyState(s.range, s.color, s.msg, s.ts); flash(); })
    .catch(function(e) { console.error('Failed to update status', e); });
  }

  function setPreset(key) {
    var p = presets[key];
    pushStatus(p.range, p.color, p.msg);
  }

  function applyCustom() {
    var minV = document.getElementById('customMin').value;
    var maxV = document.getElementById('customMax').value;
    var msg  = document.getElementById('customMsg').value.trim();
    if (!minV) return;
    var range = maxV ? minV + '–' + maxV : minV + '+';
    var mins = parseInt(minV);
    var color = mins <= 15 ? 'green' : mins <= 25 ? 'amber' : 'red';
    var finalMsg = msg || presets[color].msg;
    pushStatus(range, color, finalMsg);
    ['green','amber','red'].forEach(function(k) {
      document.getElementById('btn-' + k).className = 'quick-btn';
    });
    flash();
  }

  function flash() {
    var el = document.getElementById('confirmFlash');
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 2000);
  }

  function toggleAdmin() {
    document.getElementById('admin-panel').classList.toggle('visible');
  }

  // Fetch status from server, then decide what to show
  fetch('/status')
    .then(function(r) { return r.json(); })
    .then(function(s) {
      if (isGuest && s.color === 'green') {
        // Green + guest = straight to bbot, no splash
        window.location.replace('https://bridgedistrict.atlasanddabo.menu/' + tableNum);
      } else {
        applyState(s.range, s.color, s.msg, s.ts);
        document.body.classList.add('ready');
        // Start 20-second countdown for guests on amber/red
        if (isGuest) {
          var bbotUrl = 'https://bridgedistrict.atlasanddabo.menu/' + tableNum;
          startCountdown(bbotUrl);
        }
      }
    })
    .catch(function() {
      if (isGuest) {
        window.location.replace('https://bridgedistrict.atlasanddabo.menu/' + tableNum);
      } else {
        document.body.classList.add('ready');
      }
    });
</script>
</body>
</html>
